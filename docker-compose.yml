version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eng_validate_backend
    ports:
      - "8000:8000"
    environment:
      - ENV=dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eng_validate_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
